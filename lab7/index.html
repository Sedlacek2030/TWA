<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>JS Charts Demo</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    canvas { max-width: 600px; margin: 20px auto; display: block; }
    svg { width: 600px; height: 400px; margin: 20px auto; display: block; background: #f9f9f9; }
  </style>
</head>
<body>
  <h1 style="text-align:center;">JavaScript Chart Examples</h1>
  <canvas id="pieChart"></canvas>
  <canvas id="barChart"></canvas>
  <canvas id="lineChart"></canvas>
  <svg id="networkGraph" width="600" height="400"></svg>
  <script src="app.js"></script>
</body>
</html>
